# 日记时间统计 Agent 配置文件

# 大模型API配置
llm:
  provider: "openai"  # 支持: openai, anthropic, custom
  api_key: "***"         # 你的API密钥
  base_url: "https://api.deepseek.com"        # 自定义API地址（可选，用于代理）
  model: "deepseek-chat" # 默认模型
  temperature: 0.0    # 较低温度减少幻觉 (0.0-0.2 推荐)
  timeout: 60         # API超时时间（秒）

# 应用配置
app:
  host: "127.0.0.1"
  port: 5001
  debug: false

# 目录配置
directories:
  input: "data/input"        # 待处理文档目录
  processed: "data/processed" # 已处理文档归档
  database: "data/database.db"
  logs: "logs"

# 定时任务配置
scheduler:
  enabled: false

# 文件监控配置
watcher:
  enabled: true

# 分类树根节点（系统预置）
categories:
  roots:
    - name: "工作"
      code: "工作"
    - name: "学习"
      code: "学习"
    - name: "睡觉"
      code: "睡觉"
    - name: "玩耍"
      code: "玩耍"
    - name: "吃饭"
      code: "吃饭"
    - name: "通勤"
      code: "通勤"
    - name: "整理仪容仪表"
      code: "整理仪容仪表"
