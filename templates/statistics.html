<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计 - 时间统计</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">时间统计</div>
        <ul class="menu">
            <li><a href="/">概览</a></li>
            <li><a href="/statistics" class="active">统计</a></li>
            <li><a href="/weekly">周报</a></li>
            <li><a href="/files">文件</a></li>
            <li><a href="/settings">设置</a></li>
        </ul>
    </nav>
    <main class="content">
        <h1>统计数据</h1>
        
        <div class="week-nav">
            <button class="btn" onclick="prevWeek()">上一周</button>
            <span id="week-label">本周</span>
            <button class="btn" onclick="nextWeek()">下一周</button>
        </div>

        <div class="section">
            <h2>分类统计</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>分类</th>
                        <th>时长（小时）</th>
                    </tr>
                </thead>
                <tbody id="stats-table">
                    <tr><td colspan="2" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <h2>详细记录</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>分类</th>
                        <th>时长</th>
                        <th>来源</th>
                    </tr>
                </thead>
                <tbody id="records-table">
                    <tr><td colspan="4" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
    <script src="/static/js/app.js"></script>
    <script>
        let currentWeekOffset = 0;
        
        function getWeekRange(offset) {
            const now = new Date();
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getWeekday() + offset * 7);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 6);
            return {
                start: formatDate(weekStart),
                end: formatDate(weekEnd),
                label: `${formatDate(weekStart)} ~ ${formatDate(weekEnd)}`
            };
        }
        
        function updateWeekLabel() {
            const range = getWeekRange(currentWeekOffset);
            const label = document.getElementById('week-label');
            if (currentWeekOffset === 0) {
                label.textContent = '本周';
            } else if (currentWeekOffset === 1) {
                label.textContent = '下周';
            } else if (currentWeekOffset === -1) {
                label.textContent = '上周';
            } else {
                label.textContent = range.label;
            }
        }
        
        function prevWeek() {
            currentWeekOffset--;
            updateWeekLabel();
            loadStats();
        }
        
        function nextWeek() {
            currentWeekOffset++;
            updateWeekLabel();
            loadStats();
        }
        
        async function loadStats() {
            const range = getWeekRange(currentWeekOffset);
            
            const res = await fetch(`${API_BASE}/statistics?start_date=${range.start}&end_date=${range.end}`);
            const data = await res.json();
            
            const tbody = document.getElementById('stats-table');
            if (data.statistics && data.statistics.length > 0) {
                tbody.innerHTML = data.statistics.map(s => `
                    <tr>
                        <td>${s.name}</td>
                        <td>${s.hours}h</td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="2" class="empty-state">暂无数据</td></tr>';
            }
        }
        
        async function loadRecords() {
            const range = getWeekRange(currentWeekOffset);
            const res = await fetch(`${API_BASE}/records?limit=100&start_date=${range.start}&end_date=${range.end}`);
            const data = await res.json();
            
            const tbody = document.getElementById('records-table');
            if (data.records && data.records.length > 0) {
                tbody.innerHTML = data.records.map(r => `
                    <tr>
                        <td>${r.date}</td>
                        <td>${r.category}</td>
                        <td>${r.duration_hours}h</td>
                        <td>${r.source_file || '-'}</td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无记录</td></tr>';
            }
        }
        
        updateWeekLabel();
        loadStats();
        loadRecords();
    </script>
</body>
</html>
